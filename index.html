<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Neural Network Explorer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="gnn_explorer.css?v=20260514i">
</head>

<body class="has-background-dark">
    <section class="section mx-0">
        <div id="title-div">
            <h1 class="title has-text-centered is-1">Graph Neural Network Explorer</h1>
            <p class="subtitle has-text-centered" id="project-subtitle">An interactive walkthrough of graph neural network message passing, updates, and layer-by-layer math.</p>
        </div>

        <div class="columns" id="form-div">
            <div class="column">
                <div class="box">
                    <div class="field is-horizontal">
                        <div class="field-body">
                            <div class="field">
                                <label class="label has-text-white">Number of Nodes</label>
                                <div class="control">
                                    <input class="input" type="number" id="nodeCount" min="1" max="10" value="4">
                                </div>
                            </div>
                            <div class="field">
                                <label class="label has-text-white">Maximum Neighbors</label>
                                <div class="control">
                                    <input class="input" type="number" id="maxNeighborCount" min="1" max="3" value="3">
                                </div>
                            </div>
                            <div class="field is-grouped">
                                <div class="control mb-0 mt-auto">
                                    <button class="button is-link has-text-white" id="startButton"
                                        onclick="startGraph()">Create Graph</button>
                                </div>
                                <div class="control mb-0 mt-auto">
                                    <button class="button is-danger" id="resetButton"
                                        onclick="resetGraph()">Reset</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="columns" id="graph-aggregation-div">
            <div class="column is-three-fifths">
                <div class="box">
                    <div id="graph-container">
                        <div id="graph"></div>
                        <div id="architecture-panel" class="architecture-panel">
                            <div class="field architecture-select-field">
                                <label class="label has-text-white" for="modelSelect">GNN Architecture</label>
                                <div class="control">
                                    <div class="select is-fullwidth architecture-select-wrapper">
                                        <select id="modelSelect"></select>
                                    </div>
                                </div>
                            </div>
                            <div class="architecture-summary">
                                <p class="architecture-summary-eyebrow">Selected Architecture</p>
                                <h3 class="architecture-summary-title" id="modelLabel"></h3>
                                <p class="architecture-summary-copy" id="modelDescription"></p>
                                <div class="model-stage-chip-row" id="modelStages"></div>
                            </div>
                        </div>
                        <div id="graph-buttons" class="buttons architecture-stage-buttons" style="display: none;"></div>
                        <p id="graph-caption" class="graph-caption">Choose an architecture to inspect its message passing and update steps.</p>
                    </div>
                </div>
            </div>

            <div class="column is-two-fifths">
                <div class="box" id="aggregation-panel">
                    
                    
                </div>
            </div>
        </div>
    </section>
</body>
<script src="https://d3js.org/d3.v6.min.js"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="gnn_core.js?v=20260514i"></script>
<script src="graph_renderer.js?v=20260514i"></script>
<script src="gnn_panel.js?v=20260514i"></script>
<script src="gnn_explorer.js?v=20260514i"></script>

</html>
